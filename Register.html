<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Professional Form</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #6c63ff;
      --primary-dark: #4b44cc;
      --success: #22c55e;
      --error: #ef4444;
      --glass: rgba(255, 255, 255, 0.07);
      --border: rgba(255, 255, 255, 0.15);
      --text: #f1f5f9;
      --muted: #94a3b8;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0a0a1a;
      overflow: hidden;
      color: var(--text);
    }

    /* ── Animated Background ── */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    /* Aurora layers */
    .aurora {
      position: absolute;
      inset: -50%;
      width: 200%;
      height: 200%;
      background: conic-gradient(
        from 0deg at 50% 50%,
        #0d001a, #1a0050, #0d001a, #001a4d,
        #0d001a, #1a0050, #0d001a
      );
      animation: auroraRotate 20s linear infinite;
    }

    .aurora::after {
      content: '';
      position: absolute;
      inset: 10%;
      background: conic-gradient(
        from 180deg at 40% 60%,
        transparent,
        rgba(108, 99, 255, 0.35),
        transparent,
        rgba(0, 200, 255, 0.25),
        transparent,
        rgba(255, 0, 200, 0.2),
        transparent
      );
      border-radius: 50%;
      filter: blur(40px);
      animation: auroraRotate 15s linear infinite reverse;
    }

    @keyframes auroraRotate {
      to { transform: rotate(360deg); }
    }

    /* Grid lines */
    .grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(108, 99, 255, 0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(108, 99, 255, 0.07) 1px, transparent 1px);
      background-size: 50px 50px;
      animation: gridDrift 25s ease-in-out infinite alternate;
    }

    @keyframes gridDrift {
      from { transform: translate(0, 0); }
      to   { transform: translate(25px, 25px); }
    }

    /* Floating orbs */
    .orbs { position: absolute; inset: 0; }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(70px);
      opacity: 0.55;
      animation: orbFloat linear infinite;
    }

    .orb:nth-child(1) {
      width: 380px; height: 380px;
      background: radial-gradient(circle, #6c63ff, transparent);
      top: -10%; left: -5%;
      animation-duration: 18s;
    }
    .orb:nth-child(2) {
      width: 300px; height: 300px;
      background: radial-gradient(circle, #00c8ff, transparent);
      top: 60%; right: -5%;
      animation-duration: 22s;
      animation-delay: -8s;
    }
    .orb:nth-child(3) {
      width: 260px; height: 260px;
      background: radial-gradient(circle, #ff00c8, transparent);
      top: 30%; left: 55%;
      animation-duration: 26s;
      animation-delay: -14s;
    }
    .orb:nth-child(4) {
      width: 200px; height: 200px;
      background: radial-gradient(circle, #ffd700, transparent);
      top: 75%; left: 20%;
      animation-duration: 20s;
      animation-delay: -5s;
    }

    @keyframes orbFloat {
      0%   { transform: translate(0, 0)   scale(1); }
      25%  { transform: translate(40px, -30px) scale(1.05); }
      50%  { transform: translate(20px, 50px)  scale(0.95); }
      75%  { transform: translate(-30px, 20px) scale(1.03); }
      100% { transform: translate(0, 0)   scale(1); }
    }

    /* Particles */
    .particles { position: absolute; inset: 0; }

    .particle {
      position: absolute;
      width: 2px; height: 2px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.7);
      animation: particleRise linear infinite;
    }

    @keyframes particleRise {
      0%   { transform: translateY(0) translateX(0); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 0.5; }
      100% { transform: translateY(-100vh) translateX(var(--drift)); opacity: 0; }
    }

    /* ── Card ── */
    .card {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 480px;
      margin: 2rem;
      padding: 2.5rem 2.8rem;
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 24px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.05),
        0 25px 60px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,255,255,0.1);
      animation: cardIn 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(30px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0)    scale(1); }
    }

    .card-glow {
      position: absolute;
      inset: -2px;
      border-radius: 26px;
      background: conic-gradient(
        from var(--angle, 0deg),
        transparent 20%, #6c63ff 40%, #00c8ff 60%, transparent 80%
      );
      z-index: -1;
      opacity: 0;
      transition: opacity 0.4s;
      animation: borderSpin 4s linear infinite;
    }

    .card:hover .card-glow { opacity: 1; }

    @keyframes borderSpin {
      to { --angle: 360deg; }
    }

    @property --angle {
      syntax: '<angle>';
      initial-value: 0deg;
      inherits: false;
    }

    /* ── Header ── */
    .header { text-align: center; margin-bottom: 2rem; }

    .logo {
      width: 56px; height: 56px;
      background: linear-gradient(135deg, var(--primary), #00c8ff);
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      margin-bottom: 1rem;
      box-shadow: 0 8px 24px rgba(108,99,255,0.4);
      animation: logoPulse 3s ease-in-out infinite;
    }

    @keyframes logoPulse {
      0%, 100% { box-shadow: 0 8px 24px rgba(108,99,255,0.4); }
      50%       { box-shadow: 0 8px 40px rgba(108,99,255,0.75); }
    }

    h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: -0.02em; }
    .subtitle { color: var(--muted); font-size: 0.875rem; margin-top: 0.3rem; }

    /* ── Form Groups ── */
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .form-group {
      margin-bottom: 1.2rem;
      position: relative;
    }

    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.45rem;
      transition: color 0.2s;
    }

    .form-group:focus-within label { color: var(--primary); }

    .input-wrap {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1rem;
      pointer-events: none;
      transition: color 0.2s;
      color: var(--muted);
    }

    input, select, textarea {
      width: 100%;
      padding: 0.7rem 0.9rem 0.7rem 2.4rem;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 0.92rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    }

    select { cursor: pointer; }

    textarea {
      resize: vertical;
      min-height: 90px;
      padding-top: 0.75rem;
    }

    input::placeholder, textarea::placeholder {
      color: rgba(148, 163, 184, 0.5);
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--primary);
      background: rgba(108, 99, 255, 0.08);
      box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.2);
    }

    input.valid   { border-color: var(--success); }
    input.invalid { border-color: var(--error); }

    input.valid:focus   { box-shadow: 0 0 0 3px rgba(34,197,94,0.2); }
    input.invalid:focus { box-shadow: 0 0 0 3px rgba(239,68,68,0.2); }

    .status-icon {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.9rem;
      opacity: 0;
      transition: opacity 0.25s;
    }

    input.valid   ~ .status-icon::after { content: '✓'; color: var(--success); opacity: 1; }
    input.invalid ~ .status-icon::after { content: '✕'; color: var(--error);   opacity: 1; }
    input.valid   ~ .status-icon,
    input.invalid ~ .status-icon { opacity: 1; }

    .error-msg {
      font-size: 0.75rem;
      color: var(--error);
      margin-top: 0.35rem;
      min-height: 1em;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      opacity: 0;
      transform: translateY(-4px);
      transition: opacity 0.2s, transform 0.2s;
    }

    .error-msg.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* Password strength */
    .strength-bar {
      height: 3px;
      border-radius: 3px;
      background: rgba(255,255,255,0.08);
      margin-top: 0.5rem;
      overflow: hidden;
    }

    .strength-fill {
      height: 100%;
      border-radius: 3px;
      width: 0;
      transition: width 0.4s, background 0.4s;
    }

    .strength-label {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 0.25rem;
      min-height: 1em;
    }

    /* ── Submit ── */
    .btn {
      width: 100%;
      padding: 0.85rem;
      background: linear-gradient(135deg, var(--primary), #00c8ff);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      margin-top: 0.5rem;
      transition: transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 6px 24px rgba(108,99,255,0.4);
    }

    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.18), transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(108,99,255,0.55); }
    .btn:hover::before { opacity: 1; }
    .btn:active { transform: translateY(0); }

    .btn-text, .btn-loading { transition: opacity 0.2s; }
    .btn-loading { display: none; }

    .btn.loading .btn-text    { display: none; }
    .btn.loading .btn-loading { display: inline-block; }

    .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Success State ── */
    .success-overlay {
      position: absolute;
      inset: 0;
      background: var(--glass);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s;
      z-index: 20;
    }

    .success-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    .check-circle {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--success), #16a34a);
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem;
      margin-bottom: 1.2rem;
      animation: checkPop 0.5s cubic-bezier(0.22,1,0.36,1);
      box-shadow: 0 8px 28px rgba(34,197,94,0.45);
    }

    @keyframes checkPop {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    .success-overlay h2 { font-size: 1.4rem; margin-bottom: 0.5rem; }
    .success-overlay p  { color: var(--muted); font-size: 0.9rem; margin-bottom: 1.5rem; }

    .btn-reset {
      padding: 0.6rem 1.8rem;
      background: rgba(255,255,255,0.08);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-reset:hover { background: rgba(255,255,255,0.15); }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 1.4rem 0;
      color: var(--muted);
      font-size: 0.78rem;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Terms */
    .terms {
      display: flex;
      align-items: flex-start;
      gap: 0.6rem;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    .terms input[type="checkbox"] {
      width: auto;
      padding: 0;
      margin-top: 2px;
      accent-color: var(--primary);
      cursor: pointer;
    }

    .terms a { color: var(--primary); text-decoration: none; }
    .terms a:hover { text-decoration: underline; }

    /* Responsive */
    @media (max-width: 500px) {
      .card { padding: 2rem 1.4rem; }
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- Background -->
<div class="bg">
  <div class="aurora"></div>
  <div class="grid"></div>
  <div class="orbs">
    <div class="orb"></div>
    <div class="orb"></div>
    <div class="orb"></div>
    <div class="orb"></div>
  </div>
  <div class="particles" id="particles"></div>
</div>

<!-- Card -->
<div class="card">
  <div class="card-glow"></div>

  <!-- Success overlay -->
  <div class="success-overlay" id="successOverlay">
    <div class="check-circle">✓</div>
    <h2>You're all set!</h2>
    <p>Your account has been created successfully.<br>Welcome aboard 🎉</p>
    <button class="btn-reset" onclick="resetForm()">← Back to form</button>
  </div>

  <div class="header">
    <div class="logo">✦</div>
    <h1>Create Account</h1>
    <p class="subtitle">Fill in your details to get started</p>
  </div>

  <form id="registerForm" novalidate>

    <!-- Name row -->
    <div class="form-row">
      <div class="form-group">
        <label for="firstName">First Name</label>
        <div class="input-wrap">
          <span class="input-icon">👤</span>
          <input type="text" id="firstName" placeholder="John" autocomplete="given-name"/>
          <span class="status-icon"></span>
        </div>
        <div class="error-msg" id="firstNameErr"></div>
      </div>

      <div class="form-group">
        <label for="lastName">Last Name</label>
        <div class="input-wrap">
          <span class="input-icon">👤</span>
          <input type="text" id="lastName" placeholder="Doe" autocomplete="family-name"/>
          <span class="status-icon"></span>
        </div>
        <div class="error-msg" id="lastNameErr"></div>
      </div>
    </div>

    <!-- Email -->
    <div class="form-group">
      <label for="email">Email Address</label>
      <div class="input-wrap">
        <span class="input-icon">✉</span>
        <input type="email" id="email" placeholder="john@example.com" autocomplete="email"/>
        <span class="status-icon"></span>
      </div>
      <div class="error-msg" id="emailErr"></div>
    </div>

    <!-- Phone -->
    <div class="form-group">
      <label for="phone">Phone Number</label>
      <div class="input-wrap">
        <span class="input-icon">📞</span>
        <input type="tel" id="phone" placeholder="+1 (555) 000-0000" autocomplete="tel"/>
        <span class="status-icon"></span>
      </div>
      <div class="error-msg" id="phoneErr"></div>
    </div>

    <!-- Role -->
    <div class="form-group">
      <label for="role">Role</label>
      <div class="input-wrap">
        <span class="input-icon">💼</span>
        <select id="role">
          <option value="">— Select your role —</option>
          <option>Developer</option>
          <option>Designer</option>
          <option>Product Manager</option>
          <option>Marketing</option>
          <option>Other</option>
        </select>
      </div>
      <div class="error-msg" id="roleErr"></div>
    </div>

    <!-- Password -->
    <div class="form-group">
      <label for="password">Password</label>
      <div class="input-wrap">
        <span class="input-icon">🔒</span>
        <input type="password" id="password" placeholder="Create a strong password"/>
        <span class="status-icon"></span>
      </div>
      <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
      <div class="strength-label" id="strengthLabel"></div>
      <div class="error-msg" id="passwordErr"></div>
    </div>

    <!-- Confirm Password -->
    <div class="form-group">
      <label for="confirm">Confirm Password</label>
      <div class="input-wrap">
        <span class="input-icon">🔒</span>
        <input type="password" id="confirm" placeholder="Repeat your password"/>
        <span class="status-icon"></span>
      </div>
      <div class="error-msg" id="confirmErr"></div>
    </div>

    <div class="divider">Account details</div>

    <!-- Bio -->
    <div class="form-group">
      <label for="bio">Short Bio</label>
      <div class="input-wrap">
        <span class="input-icon" style="top:1rem;transform:none">📝</span>
        <textarea id="bio" placeholder="Tell us a little about yourself…"></textarea>
      </div>
      <div class="error-msg" id="bioErr"></div>
    </div>

    <!-- Terms -->
    <div class="terms">
      <input type="checkbox" id="terms"/>
      <label for="terms" style="text-transform:none;font-size:0.8rem;color:var(--muted);letter-spacing:0">
        I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
      </label>
    </div>
    <div class="error-msg" id="termsErr"></div>

    <button type="submit" class="btn" id="submitBtn">
      <span class="btn-text">Create Account →</span>
      <span class="btn-loading"><span class="spinner"></span>Creating…</span>
    </button>

  </form>
</div>

<script>
  /* ── Particles ── */
  (function spawnParticles() {
    const container = document.getElementById('particles');
    for (let i = 0; i < 60; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.cssText = `
        left: ${Math.random() * 100}%;
        bottom: -10px;
        --drift: ${(Math.random() - 0.5) * 80}px;
        animation-duration: ${6 + Math.random() * 10}s;
        animation-delay: ${-Math.random() * 14}s;
        opacity: ${0.3 + Math.random() * 0.7};
        width: ${1 + Math.random() * 2}px;
        height: ${1 + Math.random() * 2}px;
      `;
      container.appendChild(p);
    }
  })();

  /* ── Validation helpers ── */
  const rules = {
    firstName : v => v.trim().length >= 2          ? '' : 'First name must be at least 2 characters.',
    lastName  : v => v.trim().length >= 2          ? '' : 'Last name must be at least 2 characters.',
    email     : v => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v.trim()) ? '' : 'Enter a valid email address.',
    phone     : v => /^\+?[\d\s\-().]{7,15}$/.test(v.trim())     ? '' : 'Enter a valid phone number.',
    role      : v => v !== ''                      ? '' : 'Please select a role.',
    password  : v => v.length >= 8                 ? '' : 'Password must be at least 8 characters.',
    confirm   : v => v === document.getElementById('password').value ? '' : 'Passwords do not match.',
    bio       : v => v.trim().length >= 10         ? '' : 'Bio must be at least 10 characters.',
  };

  function showError(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg ? '⚠ ' + msg : '';
    el.classList.toggle('show', !!msg);
  }

  function setValidity(input, isValid) {
    input.classList.toggle('valid',   isValid);
    input.classList.toggle('invalid', !isValid);
  }

  function validateField(input, ruleKey, errId) {
    const msg = rules[ruleKey](input.value);
    showError(errId, msg);
    setValidity(input, !msg);
    return !msg;
  }

  /* ── Live validation ── */
  const fields = [
    ['firstName', 'firstNameErr'],
    ['lastName',  'lastNameErr'],
    ['email',     'emailErr'],
    ['phone',     'phoneErr'],
    ['password',  'passwordErr'],
    ['confirm',   'confirmErr'],
    ['bio',       'bioErr'],
  ];

  fields.forEach(([id, errId]) => {
    const input = document.getElementById(id);
    input.addEventListener('blur',  () => validateField(input, id, errId));
    input.addEventListener('input', () => {
      if (input.classList.contains('invalid')) validateField(input, id, errId);
    });
  });

  /* Re-validate confirm when password changes */
  document.getElementById('password').addEventListener('input', () => {
    const c = document.getElementById('confirm');
    if (c.value) validateField(c, 'confirm', 'confirmErr');
  });

  /* ── Password strength ── */
  document.getElementById('password').addEventListener('input', function () {
    const v = this.value;
    let score = 0;
    if (v.length >= 8)  score++;
    if (v.length >= 12) score++;
    if (/[A-Z]/.test(v)) score++;
    if (/[0-9]/.test(v)) score++;
    if (/[^A-Za-z0-9]/.test(v)) score++;

    const fill  = document.getElementById('strengthFill');
    const label = document.getElementById('strengthLabel');
    const levels = [
      { pct: '0%',   color: 'transparent',                 text: '' },
      { pct: '25%',  color: '#ef4444',                     text: 'Weak' },
      { pct: '50%',  color: '#f97316',                     text: 'Fair' },
      { pct: '75%',  color: '#eab308',                     text: 'Good' },
      { pct: '90%',  color: '#22c55e',                     text: 'Strong' },
      { pct: '100%', color: 'linear-gradient(90deg,#22c55e,#00c8ff)', text: 'Excellent ✦' },
    ];
    const l = levels[Math.min(score, 5)];
    fill.style.width      = l.pct;
    fill.style.background = l.color;
    label.textContent     = l.text ? `Strength: ${l.text}` : '';
  });

  /* Role select */
  document.getElementById('role').addEventListener('change', function () {
    const msg = rules.role(this.value);
    showError('roleErr', msg);
  });

  /* ── Form submit ── */
  document.getElementById('registerForm').addEventListener('submit', function (e) {
    e.preventDefault();

    let ok = true;

    fields.forEach(([id, errId]) => {
      const input = document.getElementById(id);
      if (!validateField(input, id, errId)) ok = false;
    });

    // Role
    const role = document.getElementById('role');
    if (rules.role(role.value)) {
      showError('roleErr', rules.role(role.value));
      ok = false;
    }

    // Terms
    const terms = document.getElementById('terms');
    if (!terms.checked) {
      showError('termsErr', 'You must accept the terms to continue.');
      ok = false;
    } else {
      showError('termsErr', '');
    }

    if (!ok) {
      /* Shake the first invalid field */
      const first = document.querySelector('input.invalid, select.invalid');
      if (first) {
        first.style.animation = 'none';
        requestAnimationFrame(() => {
          first.style.animation = 'shake 0.4s ease';
          first.scrollIntoView({ behavior: 'smooth', block: 'center' });
        });
      }
      return;
    }

    /* Simulate async submit */
    const btn = document.getElementById('submitBtn');
    btn.classList.add('loading');
    btn.disabled = true;

    setTimeout(() => {
      btn.classList.remove('loading');
      btn.disabled = false;
      document.getElementById('successOverlay').classList.add('show');
    }, 2000);
  });

  /* ── Shake animation ── */
  const shakeStyle = document.createElement('style');
  shakeStyle.textContent = `
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-6px); }
      40%      { transform: translateX(6px); }
      60%      { transform: translateX(-4px); }
      80%      { transform: translateX(4px); }
    }
  `;
  document.head.appendChild(shakeStyle);

  /* ── Reset ── */
  function resetForm() {
    document.getElementById('registerForm').reset();
    document.getElementById('successOverlay').classList.remove('show');
    document.querySelectorAll('input, select, textarea').forEach(el => {
      el.classList.remove('valid', 'invalid');
    });
    document.querySelectorAll('.error-msg').forEach(el => {
      el.textContent = '';
      el.classList.remove('show');
    });
    document.getElementById('strengthFill').style.width = '0';
    document.getElementById('strengthLabel').textContent = '';
  }
</script>
</body>
</html>
